<!DOCTYPE html>
<html data-force-light>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.25, maximum-scale=8">
<link rel="stylesheet" href="css/doc.css">
<link rel="stylesheet" href="css/serif.css">
<style>
body { padding: 10px 0 40px; }
#content .docx-wrapper { background: transparent; padding: 0; }
#content .docx-wrapper > section.docx {
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  margin-bottom: 12px;
}
</style>
<script src="js/common.js"></script>
<script src="js/jszip.min.js"></script>
<script src="js/docx-preview.min.js"></script>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="msg">여는 중…</div></div>
<div id="error"><h2>파일을 열지 못했어요</h2><p></p></div>
<div id="content"></div>
<script>
async function main() {
  const buf = await fetchDocBuffer();
  const el = document.getElementById('content');
  await window.docx.renderAsync(buf, el, null, {
    inWrapper: true,
    breakPages: true,
    ignoreLastRenderedPageBreak: true,
    experimental: true,
  });
  // Symbol/Wingdings 글머리표(사설영역 문자)는 안드로이드에 폰트가 없어 깨진다 → 일반 불릿으로.
  // docx-preview는 글머리를 ::before content에 CSS 이스케이프로 넣으므로 CSSOM에서 디코딩된 값을 고친다.
  for (const sheet of document.styleSheets) {
    let rules;
    try { rules = sheet.cssRules; } catch (e) { continue; }
    for (const r of rules) {
      if (!r.style || !r.style.content) continue;
      if (/[\uF000-\uF0FF]/.test(r.style.content)) {
        r.style.content = '"\u2022  "';
        r.style.fontFamily = 'inherit';
      }
    }
  }
  // 텍스트 노드로 들어간 사설영역(PUA) 글머리 문자도 교정 (폰트와 무관하게 확정 치환)
  el.querySelectorAll('span').forEach(s => {
    if (s.children.length) return;
    const t = s.textContent;
    if (t.length === 1) {
      const c = t.charCodeAt(0);
      if (c >= 0xF000 && c <= 0xF0FF) s.textContent = '•';
    }
  });
  fixFontFamilies(el);
  // 페이지 폭에 맞게 자동 축소 (핀치 줌으로 다시 확대 가능)
  const page = el.querySelector('section.docx');
  if (page) scaleToFit(el, page.offsetWidth + 16);
  hideLoading();
}
main().catch(showError);
</script>
</body>
</html>
