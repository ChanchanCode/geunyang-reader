<!DOCTYPE html>
<html data-force-light>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.25, maximum-scale=8">
<link rel="stylesheet" href="css/doc.css">
<style>
body { padding: 10px 0 40px; }
#content .docx-wrapper { background: transparent; padding: 0; }
#content .docx-wrapper > section.docx {
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  margin-bottom: 12px;
}
</style>
<script src="js/common.js"></script>
<script src="js/jszip.min.js"></script>
<script src="js/docx-preview.min.js"></script>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="msg">여는 중…</div></div>
<div id="error"><h2>파일을 열지 못했어요</h2><p></p></div>
<div id="content"></div>
<script>
async function main() {
  const buf = await fetchDocBuffer();
  const el = document.getElementById('content');
  await window.docx.renderAsync(buf, el, null, {
    inWrapper: true,
    breakPages: true,
    ignoreLastRenderedPageBreak: true,
    experimental: true,
  });
  // 페이지가 화면보다 넓으면 폭에 맞게 축소 (핀치 줌으로 다시 확대 가능)
  const page = el.querySelector('section.docx');
  if (page) {
    const w = page.offsetWidth;
    if (w > window.innerWidth) el.style.zoom = String(window.innerWidth / (w + 16));
  }
  hideLoading();
}
main().catch(showError);
</script>
</body>
</html>
