<!DOCTYPE html>
<html data-force-light>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.25, maximum-scale=8">
<link rel="stylesheet" href="css/doc.css">
<style>
.flow .p { margin: 0 0 4px; min-height: 1em; }
.flow table { border-collapse: collapse; margin: 8px 0; max-width: 100%; }
.flow td { border: 1px solid #b7bcc4; padding: 4px 8px; vertical-align: top; }
.flow img { max-width: 100%; height: auto; }
.flow .eq { font-family: ui-monospace, Menlo, monospace; font-style: italic; background: #f0f1f3; border-radius: 4px; padding: 1px 6px; }
</style>
<script src="js/common.js"></script>
<script src="js/jszip.min.js"></script>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="msg">여는 중…</div></div>
<div id="error"><h2>파일을 열지 못했어요</h2><p></p></div>
<article id="content" class="flow"></article>
<script>
// hwpx(OWPML) 최소 변환기: 문단/글자모양/표/이미지/수식 텍스트를 HTML로.
// 네임스페이스 접두어가 파일마다 달라 localName으로만 매칭한다.
let zip, binMap = {}, charPrMap = {}, paraPrMap = {};

function kids(el, name) {
  return Array.from(el.children).filter(c => c.localName === name);
}
function findDesc(el, name) {
  return el.getElementsByTagName('*') && Array.from(el.getElementsByTagName('*')).find(c => c.localName === name);
}

function parseHeader(doc) {
  Array.from(doc.getElementsByTagName('*')).forEach(el => {
    if (el.localName === 'charPr') {
      const s = {};
      const h = parseFloat(el.getAttribute('height') || '1000');
      s.fontSize = (h / 100) + 'pt';
      const color = el.getAttribute('textColor');
      if (color && color !== 'none' && /^#/.test(color)) s.color = color;
      for (const c of el.children) {
        if (c.localName === 'bold') s.bold = true;
        if (c.localName === 'italic') s.italic = true;
        if (c.localName === 'underline' && c.getAttribute('type') !== 'NONE') s.underline = true;
        if (c.localName === 'strikeout' && c.getAttribute('shape') !== 'NONE') s.strike = true;
      }
      charPrMap[el.getAttribute('id')] = s;
    }
    if (el.localName === 'paraPr') {
      const s = {};
      const align = findDesc(el, 'align');
      if (align) {
        const h = (align.getAttribute('horizontal') || '').toUpperCase();
        s.align = { LEFT: 'left', CENTER: 'center', RIGHT: 'right', JUSTIFY: 'justify', DISTRIBUTE: 'justify' }[h] || '';
      }
      paraPrMap[el.getAttribute('id')] = s;
    }
  });
}

function charStyle(id) {
  const s = charPrMap[id] || {};
  let css = '';
  if (s.fontSize) css += `font-size:${s.fontSize};`;
  if (s.color) css += `color:${s.color};`;
  if (s.bold) css += 'font-weight:700;';
  if (s.italic) css += 'font-style:italic;';
  const deco = [s.underline && 'underline', s.strike && 'line-through'].filter(Boolean).join(' ');
  if (deco) css += `text-decoration:${deco};`;
  return css;
}

async function imgUrl(idRef) {
  let href = binMap[idRef];
  if (!href) {
    href = Object.keys(zip.files).find(k => k.startsWith('BinData/') && k.includes(idRef));
  }
  if (!href || !zip.file(href)) return null;
  const blob = await zip.file(href).async('blob');
  const ext = href.split('.').pop().toLowerCase();
  const mime = { png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', gif: 'image/gif', bmp: 'image/bmp' }[ext] || 'image/png';
  return URL.createObjectURL(new Blob([blob], { type: mime }));
}

async function renderRunChild(el, out) {
  switch (el.localName) {
    case 't': {
      const span = document.createElement('span');
      for (const n of el.childNodes) {
        if (n.nodeType === 3) span.appendChild(document.createTextNode(n.nodeValue));
        else if (n.localName === 'lineBreak') span.appendChild(document.createElement('br'));
        else if (n.localName === 'tab') {
          const t = document.createElement('span');
          t.style.whiteSpace = 'pre';
          t.textContent = '\t';
          span.appendChild(t);
        }
      }
      out.appendChild(span);
      return span;
    }
    case 'tbl': {
      const table = document.createElement('table');
      for (const tr of kids(el, 'tr')) {
        const trEl = document.createElement('tr');
        for (const tc of kids(tr, 'tc')) {
          const td = document.createElement('td');
          const span = kids(tc, 'cellSpan')[0];
          if (span) {
            const cs = parseInt(span.getAttribute('colSpan') || '1');
            const rs = parseInt(span.getAttribute('rowSpan') || '1');
            if (cs > 1) td.colSpan = cs;
            if (rs > 1) td.rowSpan = rs;
          }
          const sub = kids(tc, 'subList')[0];
          if (sub) for (const p of kids(sub, 'p')) td.appendChild(await renderP(p));
          trEl.appendChild(td);
        }
        table.appendChild(trEl);
      }
      out.appendChild(table);
      return table;
    }
    case 'pic': {
      const imgEl = findDesc(el, 'img');
      if (imgEl) {
        const url = await imgUrl(imgEl.getAttribute('binaryItemIDRef'));
        if (url) {
          const img = document.createElement('img');
          img.src = url;
          const sz = findDesc(el, 'curSz') || findDesc(el, 'orgSz');
          if (sz) {
            const w = parseFloat(sz.getAttribute('width') || '0');
            if (w > 0) img.style.width = (w / 7200 * 96) + 'px';  // HWPUNIT(1/7200in) → CSS px
          }
          out.appendChild(img);
          return img;
        }
      }
      return null;
    }
    case 'equation': {
      const script = findDesc(el, 'script');
      if (script && script.textContent.trim()) {
        const eq = document.createElement('span');
        eq.className = 'eq';
        eq.textContent = script.textContent.trim();
        out.appendChild(eq);
        return eq;
      }
      return null;
    }
    case 'rect': case 'ellipse': case 'line': case 'polygon': case 'curve': case 'container': {
      // 도형 안의 텍스트 상자 내용만 추출
      for (const sub of Array.from(el.getElementsByTagName('*')).filter(c => c.localName === 'subList')) {
        for (const p of kids(sub, 'p')) out.appendChild(await renderP(p));
      }
      return null;
    }
    default:
      return null;
  }
}

async function renderP(p) {
  const div = document.createElement('div');
  div.className = 'p';
  const pr = paraPrMap[p.getAttribute('paraPrIDRef')] || {};
  if (pr.align) div.style.textAlign = pr.align;
  for (const run of kids(p, 'run')) {
    const css = charStyle(run.getAttribute('charPrIDRef'));
    for (const child of Array.from(run.children)) {
      const node = await renderRunChild(child, div);
      if (node && css && node.localName !== 'table') node.style.cssText += css;
    }
  }
  if (!div.childNodes.length) div.innerHTML = '&nbsp;';
  return div;
}

async function main() {
  const buf = await fetchDocBuffer();
  zip = await JSZip.loadAsync(buf);
  const parser = new DOMParser();

  // 매니페스트에서 BinData id → 경로 맵
  const hpf = zip.file('Contents/content.hpf');
  if (hpf) {
    const doc = parser.parseFromString(await hpf.async('string'), 'application/xml');
    Array.from(doc.getElementsByTagName('*')).forEach(el => {
      if (el.localName === 'item' && el.getAttribute('id') && el.getAttribute('href')) {
        binMap[el.getAttribute('id')] = el.getAttribute('href');
      }
    });
  }

  const headerFile = zip.file('Contents/header.xml');
  if (headerFile) {
    parseHeader(parser.parseFromString(await headerFile.async('string'), 'application/xml'));
  }

  const sections = Object.keys(zip.files)
    .filter(k => /^Contents\/section\d+\.xml$/.test(k))
    .sort((a, b) => parseInt(a.match(/\d+/g).pop()) - parseInt(b.match(/\d+/g).pop()));
  if (!sections.length) throw new Error('본문(section)을 찾을 수 없습니다. 손상되었거나 지원하지 않는 hwpx일 수 있어요.');

  const content = document.getElementById('content');
  for (const name of sections) {
    const doc = parser.parseFromString(await zip.file(name).async('string'), 'application/xml');
    for (const p of Array.from(doc.getElementsByTagName('*')).filter(e => e.localName === 'p' && e.parentElement && e.parentElement.localName === 'sec')) {
      content.appendChild(await renderP(p));
    }
  }
  hideLoading();
}
main().catch(showError);
</script>
</body>
</html>
