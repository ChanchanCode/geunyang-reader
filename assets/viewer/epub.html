<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.25, maximum-scale=8">
<link rel="stylesheet" href="css/doc.css">
<style>
html, body { height: 100%; overflow: hidden; background: var(--paper); }
#bar {
  position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 10;
  display: flex; align-items: center; gap: 8px; padding: 0 10px;
  background: var(--bg); border-bottom: 1px solid var(--border); box-sizing: border-box;
}
#toc { flex: 1; min-width: 0; height: 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--paper); color: var(--fg); font-family: inherit; font-size: 13px; }
#bar button {
  flex: 0 0 auto; width: 44px; height: 32px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--paper); font-size: 15px; color: var(--fg);
}
#content { position: absolute; top: 44px; bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
</style>
<script src="js/common.js"></script>
<script src="js/jszip.min.js"></script>
<script src="js/epub.min.js"></script>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="msg">여는 중…</div></div>
<div id="error"><h2>파일을 열지 못했어요</h2><p></p></div>
<div id="bar" style="display:none">
  <button id="prev">‹</button>
  <select id="toc"></select>
  <button id="next">›</button>
</div>
<div id="content"></div>
<script>
async function main() {
  const buf = await fetchDocBuffer();
  const book = ePub(buf);
  window.book = book; // 디버깅용
  const paged = PM === 'page';
  const rendition = paged
    ? book.renderTo('content', { flow: 'paginated', width: '100%', height: '100%', snap: true })
    : book.renderTo('content', { flow: 'scrolled-doc', width: '100%', fullsize: true });
  window.rendition = rendition;

  rendition.themes.register('dark', {
    body: { background: '#0f1114 !important', color: '#e4e6ea !important' },
    'a, a *': { color: '#6ba1ff !important' },
  });
  rendition.themes.register('sepia', {
    body: { background: '#f4ecd8 !important', color: '#4b3f2f !important' },
    'a, a *': { color: '#8a6d3b !important' },
  });
  if (TH === 'dark') {
    rendition.themes.select('dark');
    document.getElementById('content').style.background = '#0f1114';
  } else if (TH === 'sepia') {
    rendition.themes.select('sepia');
    document.getElementById('content').style.background = '#f4ecd8';
  }
  rendition.themes.fontSize(FS + 'px');

  // 읽던 위치 복원 — Flutter가 넘긴 저장 위치(JSON: 섹션 CFI + 스크롤 픽셀).
  // 서버 포트가 매 실행 바뀌어 localStorage는 못 쓰므로 Flutter Prefs에 저장한다.
  const content = document.getElementById('content');
  let start = { cfi: null, scroll: 0 };
  try { if (Q.get('epos')) start = JSON.parse(Q.get('epos')); } catch (e) {}
  let curCfi = start.cfi || null;
  function persist() {
    const data = JSON.stringify({ cfi: curCfi, scroll: content ? content.scrollTop : 0 });
    try {
      if (window.flutter_inappwebview) {
        window.flutter_inappwebview.callHandler('saveEpubPos', data);
      }
    } catch (e) {}
  }
  rendition.on('relocated', loc => {
    if (loc && loc.start && loc.start.cfi) curCfi = loc.start.cfi;
    persist();
  });

  // display() 프라미스가 환경에 따라 안 풀리는 경우가 있어 rendered 이벤트/타임아웃과 레이스
  const displayed = rendition.display(start.cfi || undefined);
  await Promise.race([
    displayed,
    new Promise(res => rendition.on('rendered', res)),
    new Promise(res => setTimeout(res, 4000)),
  ]);

  if (paged) {
    // 본문(iframe) 위 스와이프로 페이지 넘김
    let sx = 0;
    rendition.on('touchstart', e => { sx = e.changedTouches[0].screenX; });
    rendition.on('touchend', e => {
      const dx = e.changedTouches[0].screenX - sx;
      if (dx < -50) rendition.next();
      else if (dx > 50) rendition.prev();
    });
  }

  document.getElementById('prev').onclick = () => rendition.prev();
  document.getElementById('next').onclick = () => rendition.next();
  document.getElementById('bar').style.display = 'flex';
  hideLoading();

  // 스크롤 모드에서는 바깥 #content가 실제 스크롤을 담당한다 — epub.js relocated는
  // 이 스크롤을 추적하지 못해 CFI만으로는 챕터 시작으로만 돌아간다.
  // 그래서 챕터 내 픽셀 위치(scrollTop)를 함께 저장·복원한다.
  if (!paged) {
    if (start.scroll > 0) {
      for (const d of [300, 900, 1800]) {
        setTimeout(() => { content.scrollTop = start.scroll; }, d);
      }
    }
    let st;
    content.addEventListener('scroll', () => {
      clearTimeout(st);
      st = setTimeout(persist, 250);
    });
  }

  // 목차는 본문 표시를 막지 않게 비동기로 채운다
  book.loaded.navigation.then(nav => {
    const sel = document.getElementById('toc');
    const flat = [];
    (function walk(items, depth) {
      items.forEach(it => { flat.push([it, depth]); if (it.subitems) walk(it.subitems, depth + 1); });
    })(nav.toc || [], 0);
    flat.forEach(([it, depth]) => {
      const o = document.createElement('option');
      o.value = it.href;
      o.textContent = ' '.repeat(depth * 2) + (it.label || '').trim();
      sel.appendChild(o);
    });
    sel.onchange = () => rendition.display(sel.value);
  }).catch(() => {});
}
main().catch(showError);
</script>
</body>
</html>
