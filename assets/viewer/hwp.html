<!DOCTYPE html>
<html data-force-light>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.25, maximum-scale=8">
<link rel="stylesheet" href="css/doc.css">
<link rel="stylesheet" href="css/serif.css">
<style>
/* rhwp 폰트 폴백용: 문서가 'Noto Sans KR'를 요구하면 Pretendard로 (측정·렌더 모두 동일 규칙 적용) */
@font-face {
  font-family: 'Noto Sans KR';
  src: url('fonts/PretendardVariable.woff2') format('woff2-variations');
  font-weight: 45 920;
}
body { padding: 10px 0 40px; }
.page {
  max-width: 100%;
  margin: 0 auto 12px;
  background: #fff;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  line-height: 0; /* svg 아래 여백 제거 */
}
.page svg { width: 100%; height: auto; }
#pageinfo {
  position: fixed; top: 8px; right: 10px; z-index: 20;
  background: rgba(0,0,0,0.55); color: #fff; border-radius: 12px;
  padding: 3px 10px; font-size: 12px; line-height: 1.4;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
</style>
<script src="js/common.js"></script>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="msg">여는 중…</div></div>
<div id="error"><h2>파일을 열지 못했어요</h2><p></p></div>
<div id="pageinfo"></div>
<div id="content"></div>
<script type="module">
import init, { HwpDocument } from './js/rhwp/rhwp.js';

// rhwp가 WASM 내부 레이아웃 계산(줄바꿈·정렬)에 쓰는 텍스트 폭 측정 콜백.
// 측정과 SVG 렌더링이 같은 CSS 폰트 해석을 쓰므로 폰트가 없어도 넘침이 안 생긴다.
// init 전에 반드시 등록해야 한다.
let ctx = null;
let lastFont = '';
globalThis.measureTextWidth = (font, text) => {
  if (!ctx) ctx = document.createElement('canvas').getContext('2d');
  if (font !== lastFont) { ctx.font = font; lastFont = font; }
  return ctx.measureText(text).width;
};

async function main() {
  // 번들 폰트가 로드된 뒤 측정해야 자간·줄바꿈이 정확하다
  try { await document.fonts.ready; } catch (e) {}

  const [buf] = await Promise.all([
    fetchDocBuffer(),
    init({ module_or_path: './js/rhwp/rhwp_bg.wasm' }),
  ]);
  const doc = new HwpDocument(new Uint8Array(buf));
  const total = doc.pageCount();
  const content = document.getElementById('content');

  // 긴 문서 대비: 페이지 자리(정확한 크기의 플레이스홀더)만 먼저 잡고,
  // 화면에 가까워지면 그때 SVG를 렌더링한다
  const placeholders = [];
  for (let i = 0; i < total; i++) {
    const info = JSON.parse(doc.getPageInfo(i));
    const page = document.createElement('div');
    page.className = 'page';
    page.dataset.idx = i;
    page.style.aspectRatio = info.width + ' / ' + info.height;
    content.appendChild(page);
    placeholders.push(page);
  }

  const renderPage = (page) => {
    if (page.dataset.done) return;
    page.dataset.done = '1';
    const idx = parseInt(page.dataset.idx);
    // 페이지마다 SVG id(#cell-clip-N 등)가 같아서 한 문서에 붙이면 충돌한다.
    // 엔진에 따라 다른 페이지의 clipPath를 참조해 요소가 잘려 사라지므로
    // (안드로이드 Chromium에서 실제 발생) 페이지별 접두어로 네임스페이스를 분리한다.
    const ns = 'pg' + idx + '-';
    page.innerHTML = doc.renderPageSvg(idx)
      .replace(/\bid="/g, 'id="' + ns)
      .replace(/url\(#/g, 'url(#' + ns)
      .replace(/(xlink:href|\bhref)="#/g, '$1="#' + ns);
    page.style.aspectRatio = '';
  };

  renderPage(placeholders[0]);
  hideLoading();

  // ?debug=1: 페이지별 SVG 구성요소 진단 (플랫폼별 렌더 차이 추적용)
  if (Q.get('debug')) {
    placeholders.forEach(renderPage);
    const probe = ['비교', '실용위성', '비행성능'];
    const rows = placeholders.map((p, i) => {
      const txt = p.textContent.replace(/\s+/g, '');
      const t = p.querySelectorAll('text').length;
      const im = p.querySelectorAll('image').length;
      const hits = probe.filter(s => txt.includes(s)).join(',');
      return `p${i + 1}: text=${t} image=${im} chars=${txt.length} [${hits}]`;
    });
    const d = document.createElement('div');
    d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#000d;color:#0f0;font:12px monospace;padding:8px;z-index:99;white-space:pre-wrap;';
    d.textContent = rows.join('\n') + '\nUA: ' + navigator.userAgent.slice(0, 80);
    document.body.appendChild(d);
  }

  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) renderPage(e.target); });
  }, { rootMargin: '200%' });
  placeholders.forEach(p => io.observe(p));

  // IO 알림이 누락되는 환경 대비 폴백: 스크롤 시 뷰포트 근처 페이지를 직접 렌더
  const renderNear = () => {
    placeholders.forEach(p => {
      if (p.dataset.done) return;
      const r = p.getBoundingClientRect();
      if (r.top < window.innerHeight * 3 && r.bottom > -window.innerHeight * 2) renderPage(p);
    });
  };

  // 스크롤 시 현재 페이지 표시
  const info = document.getElementById('pageinfo');
  const pages = content.children;
  let hideTimer;
  window.addEventListener('scroll', () => {
    renderNear();
    let cur = 1;
    for (let i = 0; i < pages.length; i++) {
      if (pages[i].getBoundingClientRect().top <= window.innerHeight / 2) cur = i + 1;
    }
    info.textContent = cur + ' / ' + total;
    info.style.opacity = '1';
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => { info.style.opacity = '0'; }, 1200);
  }, { passive: true });
}
main().catch(showError);
</script>
</body>
</html>
